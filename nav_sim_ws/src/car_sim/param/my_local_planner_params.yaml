# 局部规划器参数 - MyLocalPlanner
MyLocalPlanner:
  # 速度限制 - 增大线速度
  max_vel_x: 1.0           # 增大最大前进速度
  min_vel_x: -1.0          # 增大后退速度
  max_vel_y: 1.0           # 增大最大前进速度
  min_vel_y: -1.0          # 增大后退速度
  # 角速度限制 - 降低角速度，避免过度旋转
  max_vel_theta: 3.0       # 降低最大角速度
  min_vel_theta: -3.0      # 降低最小角速度
  
  # 加速度限制
  acc_lim_x: 1.0           # 降低加速度，更平滑
  acc_lim_theta: 1.5       # 降低角加速度
  
  # 目标容差 - 增大容差
  yaw_goal_tolerance: 0.05  # 增大朝向容差
  xy_goal_tolerance: 0.1   # 增大位置容差
  
  # 规划参数
  pth_resolution: 0.1
  
  # 里程计话题
  odom_topic: "odom"

  path_simplify_epsilon: 0.01