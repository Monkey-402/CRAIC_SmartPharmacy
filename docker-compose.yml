# CRAIC Docker Compose — 需本机 X11 以显示 Gazebo / RViz
#
# 允许容器访问显示:
#   xhost +local:docker
#
# 构建并启动仿真:
#   docker compose build
#   docker compose run --rm craic roslaunch car_sim nav_sim.launch
#
# 含 control_ws（YOLO + 车牌 OCR）:
#   docker compose build --build-arg BUILD_CONTROL_WS=1
#   docker compose run --rm craic roslaunch move_nav control.launch

services:
  craic:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONTROL_WS: ${BUILD_CONTROL_WS:-0}
    image: craic:melodic
    container_name: craic
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - craic-snapshots:/root/snapshots
    working_dir: /root/craic

volumes:
  craic-snapshots:
